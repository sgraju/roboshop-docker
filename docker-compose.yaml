services:
  catalogue:
    image: catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  mongodb:
    image: mongodb:v1
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    image: mysql:v1
    container_name: mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  user:
    image: user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis
networks:
  default:
    driver: bridge
    name: roboshop
    external: false